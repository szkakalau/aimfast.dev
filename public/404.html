<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — aimfast.dev</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/_ds/base.css">
  <link rel="stylesheet" href="/_ds/components.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .not-found { text-align: center; padding: var(--space-6); }
    .not-found .code {
      font-family: var(--font-heading);
      font-size: clamp(4rem, 10vw, 7rem);
      font-weight: 700;
      color: var(--color-accent);
      line-height: 1;
      margin-bottom: var(--space-2);
    }
    .not-found h1 { margin-bottom: var(--space-1); }
    .not-found p { color: var(--color-text-secondary); margin-bottom: var(--space-4); max-width: 400px; margin-left: auto; margin-right: auto; }
    .not-found .links { display: flex; gap: var(--space-2); justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <main class="not-found">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you are looking for does not exist or has been moved. It may have been removed after its 7-day validation window.</p>
    <div class="links">
      <a href="/" class="btn btn-primary">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Back to Home
      </a>
      <a href="/dashboard/" class="btn btn-outline">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
        Dashboard
      </a>
    </div>
  </main>
</body>
</html>
