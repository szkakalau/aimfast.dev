# AimFast.Dev — Daily Pipeline (GitHub Actions)
# Runs daily at 22:30 UTC (06:30 CST / 北京时区)
# Pipeline finishes ~07:30, ready when you arrive at 09:00
# Also triggerable manually via GitHub UI → Actions → Daily Pipeline → Run workflow

name: AimFast.Dev Daily Pipeline

on:
  schedule:
    # Daily at 22:30 UTC = 06:30 CST (Beijing)
    - cron: '30 22 * * *'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Date override (YYYY-MM-DD, leave empty for today)'
        required: false
        default: ''

permissions:
  contents: write  # Required for git push back to repo

concurrency:
  group: daily-pipeline
  cancel-in-progress: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set date override (if manual trigger)
        if: ${{ github.event.inputs.date_override != '' }}
        run: |
          echo "DATE_OVERRIDE=${{ github.event.inputs.date_override }}" >> $GITHUB_ENV

      - name: Run daily pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PYTHONUTF8: '1'
          LANG: en_US.UTF-8
          TZ: Asia/Shanghai
        run: |
          chmod +x scripts/daily_run.sh
          bash scripts/daily_run.sh

      - name: Commit and push pipeline output
        if: always()
        env:
          TZ: Asia/Shanghai
        run: |
          git config user.name "AimFast.Dev Bot"
          git config user.email "bot@aimfast.dev"

          DATE=$(date +%Y-%m-%d)
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Pipeline data update: $DATE"
            git push origin HEAD:master
          fi

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ env.DATE_OVERRIDE || github.run_id }}
          path: logs/
          retention-days: 7
