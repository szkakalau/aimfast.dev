        - heading "Indie 开发者收入与定价讨论" [level=4] [ref=e422]
        - list [ref=e423]:
          - listitem [ref=e424]:
            - strong [ref=e425]: 🔍 信号
            - text: ": [14分 | w2solo] “接外包五年，我是怎么从‘码农’变成‘技术顾问’的。”"
          - listitem [ref=e426]:
            - strong [ref=e427]: 白话解读
            - text: ": 一位开发者分享了自己从“按需求写代码”到“按问题出方案”的转型。这不仅仅是角色变化，更是"
            - strong [ref=e428]: 定价权的变化
            - text: 。作为“技术顾问”，你可以按项目价值定价（比如“帮你省下 $10,000 的云成本，我收 $2,000”），而不是按小时定价。
          - listitem [ref=e429]:
            - strong [ref=e430]: 关键判断
            - text: ": 这是所有 Builder 都应该学习的定价模型。你的产品不应该只卖“功能”，而应该卖“结果”（如“省下的钱”、“节省的时间”、“避免的风险”）。"
            - strong [ref=e431]: ChatLog Audit
            - text: 的定价应该基于“能帮你省下多少 Token 费用”，而不是“我花了多少时间做报告”。
          - listitem [ref=e432]:
            - strong [ref=e433]: 反向视角
            - text: ": 这种转型需要极强的信任和行业知识。不是所有人都能立刻做到。但可以作为长期目标。"
